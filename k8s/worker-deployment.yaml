apiVersion: apps/v1
kind: Deployment
metadata:
  name: soroscan-worker-high
  namespace: soroscan
  labels:
    app: soroscan
    component: worker-high
spec:
  replicas: 1
  selector:
    matchLabels:
      app: soroscan
      component: worker-high
  template:
    metadata:
      labels:
        app: soroscan
        component: worker-high
    spec:
      containers:
        - name: worker
          image: soroscan/backend:v1.0.0
          command:
            - celery
            - -A
            - soroscan
            - worker
            - --loglevel=info
            - --concurrency=8
            - --queues=high_priority
            - --max-tasks-per-child=1000
          workingDir: /app
          envFrom:
            - configMapRef:
                name: soroscan-config
            - secretRef:
                name: soroscan-secrets
          resources:
            limits:
              cpu: 2000m
              memory: 2Gi
            requests:
              cpu: 500m
              memory: 1Gi
---
